version: '3.8'

services:
  backend:
    build: .
    command: uvicorn src.api.main_api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./db:/app/db
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build: .
    command: streamlit run src.ui/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
    ports:
      - "8501:8501"